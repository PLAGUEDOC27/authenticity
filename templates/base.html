<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Inter', sans-serif;
        background: #f6f7fb;
    }

    .navbar {
        background: #111827 !important;
    }

    .navbar a {
        color: white !important;
        font-weight: 500;
    }

    .container {
        margin-top: 30px;
    }

    .card {
        border: none;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .btn-primary {
        background: #2563eb;
        border: none;
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }
    </style>
    
    <meta charset="UTF-8">
    <title>{% block title %}Authenticity{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3">
        <h4 class="text-white mb-4">Authenticity</h4>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{{ url_for('documents.dashboard') }}" class="nav-link">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('documents.upload_document') }}" class="nav-link">Upload Document</a>
            </li>
            <li class="nav-item">
                <a href="{{url_for('documents.documents') }}" class="nav-link">Documents</a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('similarity_graph') }}" class="nav-link">Analysis</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-grow-1 p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
