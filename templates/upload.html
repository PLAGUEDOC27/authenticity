<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Document | Authenticity</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .upload-card {
            max-width: 500px;
            margin: auto;
            margin-top: 80px;
            border-radius: 14px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Upload Document</span>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<!-- UPLOAD CARD -->
<div class="card upload-card shadow">
    <div class="card-body p-4">

        <h4 class="fw-bold mb-3 text-center">Upload a Document</h4>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-4">
                <label class="form-label fw-semibold">Select File</label>
                <input 
                    type="file" 
                    name="file" 
                    class="form-control"
                    required>
                <div class="form-text">
                    Supported formats: PDF, DOCX, TXT
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Upload & Analyze
            </button>

        </form>

    </div>
</div>

</body>
</html>
