<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Authenticity</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --sidebar-width: 250px;
    --primary-dark: #0f172a;
    --bg-light: #f8fafc;
}

body {
    margin: 0;
    font-family: 'Inter', system-ui;
    background: var(--bg-light);
}

/* 🔥 SIDEBAR */
.sidebar {
    position: fixed;
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--primary-dark);
    color: white;
    padding: 20px;
}

.sidebar h4 {
    font-weight: 700;
    margin-bottom: 30px;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1e293b;
    color: white;
}

/* 🔥 MAIN */
.main {
    margin-left: var(--sidebar-width);
    padding: 30px;
}

/* 🔥 CARDS */
.card {
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

/* 🔥 KPI ICON */
.icon-box {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 CHART */
.chart-container {
    height: 300px;
}
</style>
</head>

<body>

{% include "sidebar.html" %}

<!-- 🔥 MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">Dashboard</h3>
            <small class="text-muted">System overview</small>
        </div>
    </div>

    <!-- KPI CARDS -->
    <div class="row g-4 mb-4">

        <div class="col-md-4">
            <div class="card p-4">
                <div class="d-flex align-items-center gap-4">
                    <div class="icon-box bg-info-subtle text-info">
                        <i class="bi bi-file-earmark"></i>
                    </div>
                    <div>
                        <small class="text-muted">Documents</small>
                        <h5>{{ total_docs }}</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <div class="d-flex align-items-center gap-4">
                    <div class="icon-box bg-warning-subtle text-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <div>
                        <small class="text-muted">Avg Plagiarism</small>
                        <h5>{{ avg_plagiarism }}%</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <div class="d-flex align-items-center gap-4">
                    <div class="icon-box bg-success-subtle text-success">
                        <i class="bi bi-cpu"></i>
                    </div>
                    <div>
                        <small class="text-muted">AI Score</small>
                        <h5>{{ avg_ai }}%</h5>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="card analytics-card mt-4">

    <div class="card-header bg-white border-bottom p-3">
        <strong>Resume Submissions</strong>
        <small class="text-muted d-block">All uploaded resumes from users</small>
    </div>

    <div class="card-body">

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Filename</th>
                    <th>JD Match Score</th>
                </tr>
            </thead>

            <tbody>

                {% for r in resumes %}
                <tr>

                    <td>
                        <i class="bi bi-file-earmark-text me-2"></i>
                        {{ r.filename }}
                    </td>

                    <td>
                        <div class="progress">
                            <div class="progress-bar"
                                 style="width: {{ r.jd_score }}%">
                                {{ r.jd_score }}%
                            </div>
                        </div>
                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>
</div>

</div>

<!-- 🔥 CHART SCRIPT -->
<script>
const ctx = document.getElementById('chart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ labels | default([]) | tojson }},
        datasets: [{
            label: 'Similarity %',
            data: {{ values | default([]) | tojson }},
            backgroundColor: '#0f172a',
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true,
                max: 100
            }
        }
    }
});
</script>

</body>
</html>
