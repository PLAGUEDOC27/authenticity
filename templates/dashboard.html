{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card kpi-card">
            <h6>Total Documents</h6>
            <h3>{{ total_docs }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card kpi-card">
            <h6>Avg Plagiarism</h6>
            <h3>{{ avg_plagiarism }}%</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card kpi-card">
            <h6>AI Score</h6>
            <h3>{{ avg_ai }}%</h3>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <canvas id="pieChart"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="barChart"></canvas>
    </div>
</div>

<script>
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: ["Plagiarized", "Original"],
        datasets: [{
            data: [{{ plagiarized }}, {{ original }}]
        }]
    }
});

new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: "Similarity %",
            data: {{ values|safe }}
        }]
    }
});
</script>

{% endblock %}
