<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root {
    --sidebar-width: 250px;
    --primary-dark: #0f172a;
    --bg-light: #f8fafc;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg-light);
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--primary-dark);
    color: white;
    padding: 20px;
}



.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1e293b;
    color: white;
}

/* MAIN */
.upload-wrapper {
    margin-left: var(--sidebar-width);
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* CARD */
.upload-card {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* DROP ZONE */
.drop-zone {
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 35px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.drop-zone.dragover {
    border-color: #3b82f6;
    background: #f1f5ff;
}

/* FILE LIST */
.file-item {
    background: #f1f5f9;
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
}

/* BUTTON */
.btn-upload {
    width: 100%;
    margin-top: 20px;
    background: #0f172a;
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
}

.btn-upload:hover {
    background: #678dc9;
}

</style>
</head>

<body>

{% include "sidebar.html" %}

<!-- MAIN -->
<div class="upload-wrapper">

    <div class="upload-card">

        <h4 class="mb-3">
            <i class="bi bi-cloud-upload"></i> Resume Screening Upload
        </h4>

        <form method="POST" enctype="multipart/form-data">

            <label class="fw-semibold">Job Description</label>
            <input type="file" name="jd" class="form-control mb-3" required>

            <label class="fw-semibold">Upload Resumes</label>

            <!-- DROP ZONE -->
            <div class="drop-zone" id="dropZone">
                <i class="bi bi-upload fs-3"></i>
                <p class="mb-0">Drag & Drop or Click to Upload</p>
                <small class="text-muted">PDF, DOCX supported</small>
            </div>

            <input type="file" id="resumeInput" name="resumes" multiple hidden>

            <!-- FILE LIST -->
            <div id="fileList"></div>

            <button class="btn btn-upload">
                Analyze Resumes
            </button>

        </form>

    </div>

</div>

<script>
const input = document.getElementById("resumeInput");
const dropZone = document.getElementById("dropZone");
const fileList = document.getElementById("fileList");

/* CLICK OPEN */
dropZone.addEventListener("click", () => input.click());

/* FILE PREVIEW */
function showFiles(files) {
    fileList.innerHTML = "";

    Array.from(files).forEach(file => {
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `
            <span>📄 ${file.name}</span>
            <small>${(file.size/1024).toFixed(1)} KB</small>
        `;
        fileList.appendChild(div);
    });
}

/* INPUT CHANGE */
input.addEventListener("change", () => {
    showFiles(input.files);
});

/* DRAG EVENTS */
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    input.files = e.dataTransfer.files;
    showFiles(input.files);
});
</script>

</body>
</html>
