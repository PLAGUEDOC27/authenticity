<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Documents - Authenticity</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --sidebar-width: 250px;
    --primary-dark: #0f172a;
    --bg-light: #f8fafc;
    --border: #e2e8f0;
    --accent: #3b82f6;
}

body {
    margin: 0;
    background: var(--bg-light);
    font-family: system-ui;
}


/* SIDEBAR */
.sidebar {
    position: fixed;
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--primary-dark);
    color: white;
    padding: 20px;
}

.sidebar h4 {
    font-weight: 700;
    margin-bottom: 30px;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1e293b;
    color: white;
}

/* MAIN AREA (IMPORTANT FIX) */
.main {
    margin-left: var(--sidebar-width);
    padding: 40px;
    min-height: 100vh;
}

/* CARD */
.compare-card {
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}


/* BOX */
.select-box {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    transition: 0.2s;
    background: #fff;
}

.select-box:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(59,130,246,0.15);
}

/* BUTTON */
.btn-compare {
    background: #0f172a;
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
}

.btn-compare:hover {
    background: #678dc9;
}

/* DIVIDER */
.divider {
    height: 1px;
    background: var(--border);
    margin: 25px 0;
}
</style>
</head>

<body>

{% include "sidebar.html" %}

<!-- MAIN -->
<div class="main">

    <form action="/compare" method="GET" class="compare-card">

        <div class="header text-center mb-4">
            <h4>Compare Documents</h4>
            <p class="text-muted mb-0">
                Select two documents to analyze similarity
            </p>
        </div>

        <div class="row g-4">

            <div class="col-md-6">
                <div class="select-box">
                    <label class="fw-semibold mb-2">Document A</label>
                    <select name="a" class="form-select" required>
                        <option value="">Choose document...</option>
                        {% for doc in documents %}
                        <option value="{{ doc.id }}">{{ doc.filename }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="col-md-6">
                <div class="select-box">
                    <label class="fw-semibold mb-2">Document B</label>
                    <select name="b" class="form-select" required>
                        <option value="">Choose document...</option>
                        {% for doc in documents %}
                        <option value="{{ doc.id }}">{{ doc.filename }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

        </div>

        <div class="divider"></div>

        <button class="btn btn-compare w-100">
            <i class="bi bi-intersect me-2"></i>
            Compare Now
        </button>

    </form>

</div>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
    const a = this.a.value;
    const b = this.b.value;

    if (a === b) {
        e.preventDefault();
        alert("Please select two different documents.");
    }
});
</script>

</body>
</html>
