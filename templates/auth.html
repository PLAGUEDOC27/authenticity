<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticity | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .auth-box {
            max-width: 420px;
            margin: 100px auto;
        }
    </style>
</head>
<body>

<div class="card auth-box shadow">
    <div class="card-body p-4">

        <h3 class="text-center mb-4 fw-bold">Authenticity</h3>

        <ul class="nav nav-tabs mb-3">
            <li class="nav-item w-50">
                <button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#login">
                    Login
                </button>
            </li>
            <li class="nav-item w-50">
                <button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#register">
                    Create Account
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login">
                <form method="POST" action="{{ url_for('login') }}">
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input name="username" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Login</button>
                </form>
            </div>

            <!-- REGISTER -->
            <div class="tab-pane fade" id="register">
                <form method="POST" action="{{ url_for('create_user') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-success w-100">Create Account</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
