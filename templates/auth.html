<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Authenticity | Access Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root {
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
}

.btn-primary {
    background: var(--primary) !important;
    border: none;
}

.btn-primary:hover {
    background: var(--primary-hover) !important;
}

.btn-success {
    background: var(--primary) !important;
    border: none;
}

.btn-success:hover {
    background: var(--primary-hover) !important;
}

body {
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui;
}

.auth-container {
    display: flex;
    width: 900px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.auth-left {
    width: 50%;
    background: #059669;
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.auth-left h2 {
    font-weight: 700;
}

.auth-left p {
    opacity: 0.85;
}

/* RIGHT SIDE */
.auth-right {
    width: 50%;
    padding: 40px;
}

.nav-tabs .nav-link {
    border: none;
    color: #64748b;
    font-weight: 600;
}

.nav-tabs .nav-link.active {
    color: #2563eb;
    border-bottom: 2px solid #2563eb;
}

input {
    border-radius: 8px !important;
}

.btn-primary {
    border-radius: 8px;
}

.btn-success {
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="auth-container">

    <!-- LEFT -->
    <div class="auth-left">
        <h2>Authenticity</h2>
        <p>AI-powered plagiarism & resume screening system.</p>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item w-50">
                <button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#login">
                    Login
                </button>
            </li>
            <li class="nav-item w-50">
                <button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#register">
                    Register
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login">
                <form method="POST" action="{{ url_for('login') }}">

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input name="username" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Login</button>
                </form>
            </div>

            <!-- REGISTER -->
            <div class="tab-pane fade" id="register">
                <form method="POST" action="/auth/register">

                    <div class="mb-3">
                        <label>Username</label>
                        <input name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Create Account</button>
                </form>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
